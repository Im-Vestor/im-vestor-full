<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>im-vestor.com — Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100%; height: 100vh; overflow: hidden; }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .beach-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 12vh;
    z-index: 10;
  }

  .countdown {
    display: flex;
    align-items: flex-start;
    gap: 0;
    position: relative;
    animation: counter-float 5s ease-in-out infinite;
  }

  @keyframes counter-float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  .countdown::before {
    content: '';
    position: absolute;
    inset: -10px -20px;
    background: radial-gradient(ellipse 85% 75% at 50% 45%,
      rgba(255,180,0,0.13) 0%,
      rgba(0,80,160,0.08) 60%,
      transparent 100%
    );
    border-radius: 16px;
    backdrop-filter: blur(1.5px);
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .digit-box {
    font-family: 'Orbitron', monospace;
    font-size: clamp(50px, 9vw, 125px);
    font-weight: 900;
    color: #FFD700;
    text-shadow:
      0 0 25px rgba(255,210,0,1),
      0 0 55px rgba(255,170,0,0.7),
      0 0 90px rgba(255,140,0,0.3),
      0 3px 10px rgba(0,0,0,0.65);
    line-height: 1;
    min-width: clamp(95px, 16.5vw, 235px);
    text-align: center;
    letter-spacing: -1px;
  }

  .digit-box.tick {
    text-shadow:
      0 0 35px rgba(255,245,100,1),
      0 0 70px rgba(255,200,0,0.9),
      0 0 110px rgba(255,150,0,0.5),
      0 3px 10px rgba(0,0,0,0.65);
  }

  .label {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(10px, 1.3vw, 17px);
    font-weight: 700;
    color: rgba(255,240,140,0.95);
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: -5px;
    z-index: 1;
  }

  .colon {
    font-family: 'Orbitron', monospace;
    font-size: clamp(50px, 9vw, 125px);
    font-weight: 900;
    color: #FFD700;
    text-shadow:
      0 0 25px rgba(255,210,0,1),
      0 0 55px rgba(255,170,0,0.7);
    line-height: 1;
    padding: 0 3px;
    animation: blink 1s step-end infinite;
    z-index: 1;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }

  .launch-date {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(32px, 4.4vw, 60px);
    font-weight: 700;
    color: rgba(255,240,140,0.95);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    margin-bottom: 6px;
    animation: counter-float 5s ease-in-out infinite;
  }

  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(32px, 5vw, 68px);
    font-weight: 700;
    color: #FFE566;
    letter-spacing: 3px;
    text-transform: lowercase;
    margin-top: 8px;
    text-shadow:
      0 0 20px rgba(255,220,50,0.95),
      0 0 40px rgba(255,180,0,0.6),
      0 2px 8px rgba(0,0,0,0.8);
    animation: counter-float 5s ease-in-out infinite;
  }

  .finished-msg {
    display: none;
    font-family: 'Orbitron', monospace;
    font-size: clamp(26px, 4.5vw, 60px);
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 30px rgba(255,210,0,1), 0 0 60px rgba(255,170,0,0.7);
    text-align: center;
    animation: pulse-text 1s ease-in-out infinite alternate;
  }
  @keyframes pulse-text {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }
</style>
</head>

<script>
  const target = new Date('2026-06-01T00:00:00').getTime();
  const elDays = document.getElementById('days');
  const elHours = document.getElementById('hours');
  const elMinutes = document.getElementById('minutes');
  const elSeconds = document.getElementById('seconds');
  const elFinished = document.getElementById('finished');
  const elCountdown = document.getElementById('countdown');
  let prevSec = -1;

  function tick() {
    const now = Date.now();
    let diff = target - now;
    if (diff <= 0) {
      elCountdown.style.display = 'none';
      elFinished.style.display = 'block';
      return;
    }
    const s = Math.floor(diff / 1000) % 60;
    const m = Math.floor(diff / 60000) % 60;
    const h = Math.floor(diff / 3600000) % 24;
    const d = Math.floor(diff / 86400000);
    elDays.textContent    = String(d).padStart(3, '0');
    elHours.textContent   = String(h).padStart(2, '0');
    elMinutes.textContent = String(m).padStart(2, '0');
    elSeconds.textContent = String(s).padStart(2, '0');
    if (s !== prevSec) {
      prevSec = s;
      elSeconds.classList.add('tick');
      setTimeout(() => elSeconds.classList.remove('tick'), 200);
    }
  }
  tick();
  setInterval(tick, 500);
</script>
